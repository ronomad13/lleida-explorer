<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lleida Explorer</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LleidaXP">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #252a36;
    --visited: #00e5a0;
    --unvisited: #c0392b;
    --accent: #ff6b35;
    --text: #e8eaf0;
    --muted: #5a6175;
    --marker: #4dabf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--visited); }

  .stats-bar {
    display: flex;
    gap: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stat-val {
    font-weight: 700;
    font-size: 14px;
    color: var(--visited);
  }

  .stat-label { color: var(--muted); font-size: 9px; text-transform: uppercase; }

  #map {
    flex: 1;
    background: var(--bg);
  }

  /* Leaflet dark overrides */
  .leaflet-tile { filter: invert(1) hue-rotate(200deg) saturate(0.4) brightness(0.85); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution { display: none; }

  .bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active { background: var(--visited); box-shadow: 0 0 8px var(--visited); animation: pulse 2s infinite; }
  .status-dot.searching { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #status-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    flex: 1;
  }

  .current-street {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    min-height: 14px;
  }

  .current-street span { color: var(--visited); font-weight: 700; }

  .btn-row { display: flex; gap: 8px; }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    padding: 10px 14px;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  #btn-track {
    background: var(--visited);
    color: #000;
    flex: 1;
  }

  #btn-track:hover { opacity: 0.85; }
  #btn-track.tracking { background: var(--accent); }

  #btn-reset {
    background: var(--border);
    color: var(--muted);
  }

  #btn-reset:hover { color: var(--text); background: #2e3548; }

  #btn-center {
    background: var(--border);
    color: var(--marker);
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-bottom: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .legend-line {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }

  .toast {
    position: fixed;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--visited);
    color: #000;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    z-index: 2000;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--visited), #00b8d4);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lleida<span>XP</span></div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="visited-count">0</div>
      <div class="stat-label">Visitades</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="total-count">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="pct">0%</div>
      <div class="stat-label">Cobert</div>
    </div>
  </div>
</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background:var(--visited)"></div>
      Visitada
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#c0392b"></div>
      Per visitar
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:var(--marker)"></div>
      Tu posició
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="current-street" id="current-street">Inicia el tracking per comenzar</div>

  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <div id="status-text">Prem "Iniciar" per activar el GPS</div>
  </div>

  <div class="btn-row">
    <button id="btn-track" onclick="toggleTracking()">▶ Iniciar</button>
    <button id="btn-center" onclick="centerOnMe()">⊕ Centrar</button>
    <button id="btn-reset" onclick="resetProgress()">↺ Reset</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const LLEIDA_CENTER = [41.6177, 0.6200];
const LLEIDA_BOUNDS = [[41.58, 0.57], [41.66, 0.68]];
const STORAGE_KEY = 'lleida_xp_visited';

let map, userMarker, userCircle, watchId;
let tracking = false;
let allSegments = {};      // id -> { layer, name, coords, visited }
let visitedIds = new Set();
let lastPos = null;

// Load saved progress
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) visitedIds = new Set(JSON.parse(saved));
} catch(e) {}

// ─── Map Init ────────────────────────────────────────────────────────────────
map = L.map('map', {
  center: LLEIDA_CENTER,
  zoom: 15,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ─── Load OSM Streets via Overpass ─────────────────────────────────────────
async function loadStreets() {
  showStatus('Carregant carrers de Lleida…', 'searching');

  const query = `
    [out:json][timeout:30];
    (
      way["highway"~"^(residential|primary|secondary|tertiary|unclassified|living_street|pedestrian|footway|path|service|trunk|motorway_link|primary_link|secondary_link|tertiary_link)$"]
      (41.595,0.575,41.655,0.670);
    );
    out geom;
  `;

  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query
    });
    const data = await res.json();
    renderStreets(data.elements);
  } catch(e) {
    showStatus('Error carregant mapa. Comprova connexió.', false);
    showToast('Error carregant OSM');
  }
}

function renderStreets(elements) {
  elements.forEach(el => {
    if (el.type !== 'way' || !el.geometry) return;

    const coords = el.geometry.map(p => [p.lat, p.lon]);
    const name = el.tags?.name || el.tags?.['name:ca'] || null;
    const isVisited = visitedIds.has(String(el.id));

    const layer = L.polyline(coords, {
      color: isVisited ? '#00e5a0' : '#c0392b',
      weight: isVisited ? 4 : 2.5,
      opacity: isVisited ? 0.9 : 0.7,
      lineCap: 'round',
      lineJoin: 'round'
    }).addTo(map);

    if (name) {
      layer.bindTooltip(name, { permanent: false, className: 'street-tooltip' });
    }

    allSegments[el.id] = { layer, name, coords, visited: isVisited };
  });

  updateStats();
  showStatus('Mapa carregat. Prem "Iniciar".', false);
}

// ─── Tracking ────────────────────────────────────────────────────────────────
function toggleTracking() {
  tracking = !tracking;
  const btn = document.getElementById('btn-track');

  if (tracking) {
    btn.textContent = '⏹ Aturar';
    btn.classList.add('tracking');
    requestWakeLock();
    startGPS();
  } else {
    btn.textContent = '▶ Iniciar';
    btn.classList.remove('tracking');
    releaseWakeLock();
    stopGPS();
    showStatus('Tracking aturat.', false);
  }
}

function startGPS() {
  showStatus('Buscant posició…', 'searching');

  if (!navigator.geolocation) {
    showStatus('GPS no disponible en aquest navegador.', false);
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    onPosition,
    onGPSError,
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function stopGPS() {
  if (watchId != null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  document.getElementById('status-dot').className = 'status-dot';
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  lastPos = [lat, lng];

  // Update marker
  if (!userMarker) {
    userMarker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: '#4dabf7', fillOpacity: 1,
      color: '#fff', weight: 2
    }).addTo(map);

    userCircle = L.circle([lat, lng], {
      radius: accuracy, color: '#4dabf7',
      fillColor: '#4dabf7', fillOpacity: 0.08,
      weight: 1
    }).addTo(map);

    map.setView([lat, lng], 17);
  } else {
    userMarker.setLatLng([lat, lng]);
    userCircle.setLatLng([lat, lng]);
    userCircle.setRadius(accuracy);
  }

  showStatus(`GPS actiu · precisió ~${Math.round(accuracy)}m`, 'active');
  detectNearbyStreet(lat, lng);
}

function onGPSError(err) {
  const msgs = {
    1: 'Permís GPS denegat. Activa la ubicació.',
    2: 'Posició no disponible.',
    3: 'Temps esgotat buscant GPS.'
  };
  showStatus(msgs[err.code] || 'Error GPS', false);
}

// ─── Street Detection ────────────────────────────────────────────────────────
// Per marcar un carrer cal haver-hi recorregut almenys MIN_WALK metres
const MIN_WALK = 15;
let streetProgress = {}; // id -> { entryPoint, accumulated }

function detectNearbyStreet(lat, lng) {
  let closest = null;
  let minDist = Infinity;
  const THRESHOLD = 20; // metres per considerar que estàs al carrer

  for (const [id, seg] of Object.entries(allSegments)) {
    const dist = distToPolyline([lat, lng], seg.coords);
    if (dist < minDist) {
      minDist = dist;
      closest = { id, ...seg };
    }
  }

  if (closest && minDist < THRESHOLD) {
    const label = closest.name || 'Carrer sense nom';
    document.getElementById('current-street').innerHTML =
      `Estàs a: <span>${label}</span>`;

    if (!closest.visited) {
      const id = closest.id;
      if (!streetProgress[id]) {
        // Primera vegada que entrem al carrer
        streetProgress[id] = { lastPt: [lat, lng], accumulated: 0 };
      } else {
        // Acumula distància recorreguda dins el carrer
        const prev = streetProgress[id].lastPt;
        const d = haversineDist(prev, [lat, lng]);
        streetProgress[id].accumulated += d;
        streetProgress[id].lastPt = [lat, lng];

        if (streetProgress[id].accumulated >= MIN_WALK) {
          markVisited(id, closest.name);
          delete streetProgress[id];
        }
      }
    }
  } else {
    // Hem sortit del carrer, reseteja el progrés del carrer actual
    if (closest) delete streetProgress[closest.id];
  }
}

function markVisited(id, name) {
  const seg = allSegments[id];
  if (!seg) return;

  seg.visited = true;
  seg.layer.setStyle({ color: '#00e5a0', weight: 4, opacity: 0.9 });
  seg.layer.bringToFront();

  visitedIds.add(String(id));
  saveProgress();
  updateStats();

  if (name) showToast(`✓ ${name}`);
}

// ─── Geometry ────────────────────────────────────────────────────────────────
function distToPolyline(pt, coords) {
  let min = Infinity;
  for (let i = 0; i < coords.length - 1; i++) {
    const d = distToSegment(pt, coords[i], coords[i + 1]);
    if (d < min) min = d;
  }
  return min;
}

function distToSegment(p, a, b) {
  // In metres using Haversine-ish approximation
  const toRad = x => x * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(b[0] - a[0]);
  const dLng = toRad(b[1] - a[1]);

  // Project p onto segment ab
  const ax = toRad(a[0]), ay = toRad(a[1]);
  const bx = toRad(b[0]), by = toRad(b[1]);
  const px = toRad(p[0]), py = toRad(p[1]);

  const ab2 = (bx-ax)**2 + (by-ay)**2;
  if (ab2 === 0) return haversineDist(p, a);

  let t = ((px-ax)*(bx-ax) + (py-ay)*(by-ay)) / ab2;
  t = Math.max(0, Math.min(1, t));

  const nearLat = a[0] + t * (b[0] - a[0]);
  const nearLng = a[1] + t * (b[1] - a[1]);
  return haversineDist(p, [nearLat, nearLng]);
}

function haversineDist(a, b) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(b[0] - a[0]);
  const dLon = toRad(b[1] - a[1]);
  const s = Math.sin(dLat/2)**2 +
            Math.cos(toRad(a[0])) * Math.cos(toRad(b[0])) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}

// ─── UI Helpers ──────────────────────────────────────────────────────────────
function updateStats() {
  const total = Object.keys(allSegments).length;
  const visited = Object.values(allSegments).filter(s => s.visited).length;
  const pct = total ? Math.round((visited / total) * 100) : 0;

  document.getElementById('visited-count').textContent = visited;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showStatus(msg, type) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type === 'active' ? ' active' : type === 'searching' ? ' searching' : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function centerOnMe() {
  if (lastPos) map.setView(lastPos, 17);
  else showToast('Activa el tracking primer');
}

function resetProgress() {
  if (!confirm('Vols esborrar tot el progrés?')) return;
  visitedIds.clear();
  localStorage.removeItem(STORAGE_KEY);

  for (const seg of Object.values(allSegments)) {
    seg.visited = false;
    seg.layer.setStyle({ color: '#c0392b', weight: 2.5, opacity: 0.7 });
  }
  updateStats();
  showToast('Progrés esborrat');
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...visitedIds]));
  } catch(e) {}
}

// ─── PWA Service Worker ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Wake Lock (pantalla encesa mentre tracking) ─────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock && document.visibilityState === 'visible' && tracking) {
    await requestWakeLock();
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
loadStreets();
</script>

<style>
.street-tooltip {
  background: #161921;
  border: 1px solid #252a36;
  color: #e8eaf0;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  box-shadow: none;
}
</style>
</body>
</html>
